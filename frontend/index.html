<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Market Predictor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3e;
      --accent:   #6366f1;
      --accent2:  #818cf8;
      --up:       #22c55e;
      --down:     #ef4444;
      --muted:    #6b7280;
      --text:     #e5e7eb;
      --subtext:  #9ca3af;
      --radius:   10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .page { max-width: 820px; margin: 0 auto; }

    /* ── header ── */
    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 1.8rem; font-weight: 700; color: var(--accent2); }
    header p  { color: var(--subtext); margin-top: .4rem; font-size: .9rem; }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); margin-right: 6px; vertical-align: middle;
      transition: background .3s;
    }
    .status-dot.live { background: var(--up); box-shadow: 0 0 6px var(--up); }

    /* ── tabs ── */
    .tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .tab {
      padding: .45rem 1.1rem; border-radius: var(--radius); cursor: pointer;
      font-size: .85rem; font-weight: 500; border: 1px solid var(--border);
      background: transparent; color: var(--subtext); transition: all .2s;
    }
    .tab.active, .tab:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem;
    }
    .card-title { font-size: .75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: var(--subtext); margin-bottom: 1rem; }

    /* ── form ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    label { display: block; font-size: .8rem; color: var(--subtext); margin-bottom: .35rem; }
    input, select, textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); padding: .6rem .8rem;
      font-size: .9rem; outline: none; transition: border-color .2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 90px; }
    select option { background: var(--surface); }

    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .65rem 1.4rem; border-radius: var(--radius); border: none;
      font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; justify-content: center; margin-top: 1rem; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sm { padding: .4rem .9rem; font-size: .8rem; }
    .btn-ghost { background: var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--accent); color: #fff; }

    /* ── result ── */
    #result { display: none; }

    .verdict {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
    }
    .direction {
      font-size: 2.2rem; font-weight: 800;
      display: flex; align-items: center; gap: .5rem;
    }
    .direction.up   { color: var(--up);   }
    .direction.down { color: var(--down); }
    .direction .arrow { font-size: 2.5rem; }

    .prob-bar-wrap { flex: 1; min-width: 160px; }
    .prob-label { font-size: .75rem; color: var(--subtext); margin-bottom: .4rem;
      display: flex; justify-content: space-between; }
    .prob-bar { height: 10px; border-radius: 99px; background: var(--border); overflow: hidden; }
    .prob-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
    .prob-fill.up   { background: var(--up); }
    .prob-fill.down { background: var(--down); }

    .badge {
      display: inline-block; padding: .25rem .65rem; border-radius: 99px;
      font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
    }
    .badge-high { background: rgba(99,102,241,.2); color: var(--accent2); }
    .badge-low  { background: rgba(107,114,128,.2); color: var(--muted); }

    /* ── metrics row ── */
    .metrics { display: flex; gap: .75rem; flex-wrap: wrap; margin-top: .75rem; }
    .metric {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: .65rem 1rem; flex: 1; min-width: 110px;
    }
    .metric-label { font-size: .68rem; color: var(--subtext); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: .2rem; }
    .metric-value { font-size: 1.15rem; font-weight: 700; color: var(--text); }

    /* ── analogs ── */
    .analog-row {
      display: flex; align-items: flex-start; gap: .8rem;
      padding: .7rem 0; border-bottom: 1px solid var(--border);
    }
    .analog-row:last-child { border-bottom: none; }
    .analog-icon { font-size: 1.2rem; margin-top: .1rem; flex-shrink: 0; }
    .analog-headline { font-size: .85rem; color: var(--text); line-height: 1.4; }
    .analog-meta { font-size: .72rem; color: var(--subtext); margin-top: .25rem; }
    .analog-ret { font-size: .8rem; font-weight: 600; margin-left: auto;
      flex-shrink: 0; padding-left: .5rem; }
    .analog-ret.pos { color: var(--up); }
    .analog-ret.neg { color: var(--down); }

    /* ── history tab ── */
    #history-panel { display: none; }
    .history-controls { display: flex; gap: .75rem; align-items: flex-end; }
    .history-controls .field { flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th { text-align: left; color: var(--subtext); font-size: .72rem;
      text-transform: uppercase; letter-spacing: .06em;
      padding: .5rem .75rem; border-bottom: 1px solid var(--border); }
    td { padding: .6rem .75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .chip { display: inline-block; padding: .15rem .5rem; border-radius: 99px;
      font-size: .7rem; font-weight: 600; }
    .chip-up   { background: rgba(34,197,94,.15);  color: var(--up);   }
    .chip-down { background: rgba(239,68,68,.15);  color: var(--down); }
    .chip-null { background: rgba(107,114,128,.15); color: var(--muted); }

    /* ── error ── */
    .error-box {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius); padding: 1rem; color: #fca5a5;
      font-size: .85rem; white-space: pre-wrap; display: none;
    }

    /* ── spinner ── */
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .mt1 { margin-top: 1rem; }
  </style>
</head>
<body>
<div class="page">

  <header>
    <h1>📈 News Market Predictor</h1>
    <p>
      <span class="status-dot" id="dot"></span>
      <span id="status-text">Checking server…</span>
    </p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('predict')">Predict</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <!-- ════════════ PREDICT PANEL ════════════ -->
  <div id="predict-panel">

    <div class="card">
      <div class="card-title">Article details</div>
      <div class="grid-2">
        <div>
          <label for="ticker">Ticker</label>
          <select id="ticker"></select>
        </div>
        <div>
          <label for="pub-date">Published date</label>
          <input type="date" id="pub-date" />
        </div>
      </div>
      <div class="mt1">
        <label for="headline">Headline <span style="color:var(--down)">*</span></label>
        <input type="text" id="headline" placeholder="e.g. Apple reports record Q4 earnings…" />
      </div>
      <div class="mt1">
        <label for="body">Article body <span style="color:var(--subtext)">(optional — improves RAG matching)</span></label>
        <textarea id="body" placeholder="Paste the article text here…"></textarea>
      </div>
      <div class="mt1">
        <label for="url">URL <span style="color:var(--subtext)">(optional — persists prediction to DB)</span></label>
        <input type="text" id="url" placeholder="https://…" />
      </div>
      <button class="btn btn-primary" id="predict-btn" onclick="runPredict()">
        <span class="spinner" id="spinner"></span>
        <span id="btn-label">Run Prediction</span>
      </button>
    </div>

    <div class="error-box" id="err-box"></div>

    <!-- ── result ── -->
    <div id="result">

      <div class="card">
        <div class="card-title">Prediction</div>
        <div class="verdict">
          <div class="direction" id="direction-text"></div>
          <div class="prob-bar-wrap">
            <div class="prob-label">
              <span>Probability</span>
              <span id="prob-pct"></span>
            </div>
            <div class="prob-bar"><div class="prob-fill" id="prob-fill"></div></div>
          </div>
          <div>
            <span class="badge" id="conf-badge"></span>
          </div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="metric-label">Sentiment</div>
            <div class="metric-value" id="m-sentiment"></div>
          </div>
          <div class="metric">
            <div class="metric-label">Analog return</div>
            <div class="metric-value" id="m-analog-ret"></div>
          </div>
          <div class="metric">
            <div class="metric-label">Hit rate</div>
            <div class="metric-value" id="m-hit-rate"></div>
          </div>
          <div class="metric">
            <div class="metric-label">Analogs found</div>
            <div class="metric-value" id="m-n-analogs"></div>
          </div>
          <div class="metric">
            <div class="metric-label">Model</div>
            <div class="metric-value" id="m-version"></div>
          </div>
        </div>
      </div>

      <div class="card" id="analogs-card" style="display:none">
        <div class="card-title">Top analog articles</div>
        <div id="analogs-list"></div>
      </div>

    </div>
  </div>

  <!-- ════════════ HISTORY PANEL ════════════ -->
  <div id="history-panel">
    <div class="card">
      <div class="card-title">Recent predictions by ticker</div>
      <div class="history-controls">
        <div class="field">
          <label for="hist-ticker">Ticker</label>
          <select id="hist-ticker"></select>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="loadHistory()">Load</button>
      </div>
      <div id="hist-table-wrap" class="mt1"></div>
    </div>
  </div>

</div><!-- /page -->

<script>
const API = 'http://localhost:8000';
let tickers = [];

// ── boot ────────────────────────────────────────────────────────────────────
async function boot() {
  // health check
  try {
    const r = await fetch(`${API}/health`);
    const data = await r.json();
    document.getElementById('dot').classList.add('live');
    document.getElementById('status-text').textContent =
      `Server online · ${data.db_article_count.toLocaleString()} articles · model ${data.model_version}`;
  } catch {
    document.getElementById('status-text').textContent = 'Server offline — start with: make serve';
    return;
  }

  // populate ticker dropdowns
  try {
    const r = await fetch(`${API}/tickers`);
    tickers = await r.json();
    const options = tickers.map(t =>
      `<option value="${t.ticker}">${t.ticker} — ${t.sector}</option>`
    ).join('');
    document.getElementById('ticker').innerHTML = options;
    document.getElementById('hist-ticker').innerHTML = options;
  } catch {}

  // default date to today
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('pub-date').value = today;
}

// ── tabs ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el, i) =>
    el.classList.toggle('active', ['predict','history'][i] === tab)
  );
  document.getElementById('predict-panel').style.display = tab === 'predict' ? '' : 'none';
  document.getElementById('history-panel').style.display = tab === 'history' ? '' : 'none';
}

// ── predict ─────────────────────────────────────────────────────────────────
async function runPredict() {
  const headline = document.getElementById('headline').value.trim();
  if (!headline) { alert('Headline is required.'); return; }

  const ticker  = document.getElementById('ticker').value;
  const pubDate = document.getElementById('pub-date').value;
  const body    = document.getElementById('body').value.trim() || null;
  const url     = document.getElementById('url').value.trim() || null;

  setLoading(true);
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('result').style.display = 'none';

  const payload = {
    ticker,
    headline,
    body,
    url,
    published_at: pubDate ? `${pubDate}T09:00:00` : new Date().toISOString(),
  };

  try {
    const r = await fetch(`${API}/predict`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
    renderResult(data);
  } catch (e) {
    const box = document.getElementById('err-box');
    box.textContent = `Error: ${e.message}`;
    box.style.display = 'block';
  } finally {
    setLoading(false);
  }
}

function renderResult(d) {
  const isUp = d.predicted_label === 1;
  const pct  = (d.predicted_prob * 100).toFixed(1);

  // direction
  const dir = document.getElementById('direction-text');
  dir.className = `direction ${isUp ? 'up' : 'down'}`;
  dir.innerHTML = `<span class="arrow">${isUp ? '↑' : '↓'}</span> ${isUp ? 'UP' : 'DOWN'}`;

  // bar
  const fill = document.getElementById('prob-fill');
  fill.style.width = `${pct}%`;
  fill.className = `prob-fill ${isUp ? 'up' : 'down'}`;
  document.getElementById('prob-pct').textContent = `${pct}%`;

  // confidence badge
  const badge = document.getElementById('conf-badge');
  badge.textContent = d.confidence + ' confidence';
  badge.className = `badge badge-${d.confidence}`;

  // metrics
  const rag = d.rag_features;
  const sentiment = d.sentiment_score;
  const sentColor = sentiment > 0 ? 'color:var(--up)' : sentiment < 0 ? 'color:var(--down)' : '';
  document.getElementById('m-sentiment').innerHTML =
    `<span style="${sentColor}">${(sentiment >= 0 ? '+' : '') + sentiment.toFixed(3)}</span>`;

  const avgRet = rag.mean_analog_return;
  document.getElementById('m-analog-ret').innerHTML =
    `<span style="${avgRet > 0 ? 'color:var(--up)' : avgRet < 0 ? 'color:var(--down)' : ''}">`
    + `${(avgRet >= 0 ? '+' : '') + (avgRet * 100).toFixed(2)}%</span>`;

  document.getElementById('m-hit-rate').textContent =
    rag.n_analogs > 0 ? `${(rag.analog_hit_rate * 100).toFixed(0)}%` : 'N/A';
  document.getElementById('m-n-analogs').textContent = rag.n_analogs;
  document.getElementById('m-version').textContent = d.model_version;

  // analogs
  const analogsCard = document.getElementById('analogs-card');
  const analogsList = document.getElementById('analogs-list');
  if (d.analog_articles && d.analog_articles.length > 0) {
    analogsList.innerHTML = d.analog_articles.map(a => {
      const ret = a.return_3d;
      const retStr = (ret >= 0 ? '+' : '') + (ret * 100).toFixed(2) + '%';
      return `
        <div class="analog-row">
          <div class="analog-icon">${ret > 0 ? '📈' : '📉'}</div>
          <div style="flex:1">
            <div class="analog-headline">${escHtml(a.headline)}</div>
            <div class="analog-meta">
              ${fmtDate(a.published_at)} &nbsp;·&nbsp;
              Similarity: ${(a.similarity_score * 100).toFixed(1)}%
            </div>
          </div>
          <div class="analog-ret ${ret > 0 ? 'pos' : 'neg'}">${retStr}</div>
        </div>`;
    }).join('');
    analogsCard.style.display = '';
  } else {
    analogsCard.style.display = 'none';
  }

  document.getElementById('result').style.display = '';
}

// ── history ──────────────────────────────────────────────────────────────────
async function loadHistory() {
  const ticker = document.getElementById('hist-ticker').value;
  const wrap = document.getElementById('hist-table-wrap');
  wrap.innerHTML = '<p style="color:var(--subtext);font-size:.85rem">Loading…</p>';

  try {
    const r = await fetch(`${API}/history/${ticker}`);
    const rows = await r.json();
    if (!r.ok) throw new Error(rows.detail || 'Error');
    if (rows.length === 0) {
      wrap.innerHTML = '<p style="color:var(--subtext);font-size:.85rem">No predictions yet for this ticker.</p>';
      return;
    }
    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Headline</th>
            <th>Prob</th>
            <th>Predicted</th>
            <th>Actual</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <td style="color:var(--subtext)">${row.prediction_id}</td>
              <td>${escHtml(row.headline.length > 55 ? row.headline.slice(0,55)+'…' : row.headline)}</td>
              <td>${(row.predicted_prob * 100).toFixed(1)}%</td>
              <td><span class="chip ${row.predicted_label === 1 ? 'chip-up' : 'chip-down'}">${row.predicted_label === 1 ? '↑ UP' : '↓ DOWN'}</span></td>
              <td>${row.actual_label === null
                ? '<span class="chip chip-null">—</span>'
                : `<span class="chip ${row.actual_label === 1 ? 'chip-up' : 'chip-down'}">${row.actual_label === 1 ? '↑ UP' : '↓ DOWN'}</span>`
              }</td>
              <td style="color:var(--subtext);font-size:.75rem">${fmtDate(row.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  } catch (e) {
    wrap.innerHTML = `<p style="color:var(--down);font-size:.85rem">${e.message}</p>`;
  }
}

// ── helpers ──────────────────────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-label').textContent  = on ? 'Running…' : 'Run Prediction';
  document.getElementById('predict-btn').disabled   = on;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); }
  catch { return iso; }
}

// Allow Enter key on headline to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'headline') runPredict();
});

boot();
</script>
</body>
</html>
